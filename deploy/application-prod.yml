# 生产环境配置
server:
  port: 8080

spring:
  application:
    name: travel-system

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/travel_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234567890
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nolog.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.travel.entity

jwt:
  secret: ${JWT_SECRET:travel-system-secret-key-2026-very-long-and-secure-key-for-jwt-signing}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

result:
  success-code: 200
  error-code: 500

file:
  upload-dir: /data/uploads
  base-url: https://yourdomain.com/uploads

logging:
  level:
    root: INFO
    com.travel: INFO
  file:
    name: /var/log/travel-system/app.log
    max-size: 100MB
    max-history: 30
