server:
  port: 8080

spring:
  application:
    name: travel-system

  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/travel_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 1234567890

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.travel.entity

# JWT配置
jwt:
  secret: travel-system-secret-key-2026-very-long-and-secure-key-for-jwt-signing
  access-token-expiration: 86400000   # 24小时
  refresh-token-expiration: 604800000 # 7天

# 统一响应
result:
  success-code: 200
  error-code: 500
